# MooseFS Master – test cluster config
# Minimal overrides; rely on Docker image defaults where possible
WORKING_USER = mfs
WORKING_GROUP = mfs
SYSLOG_IDENT = mfsmaster
DATA_PATH = /var/lib/mfs
EXPORTS_FILENAME = /etc/mfs/mfsexports.cfg
BACK_LOGS = 50
METADATA_SAVE_FREQ = 1
# Standard CE ports (matching Docker image defaults)
MATOCS_LISTEN_PORT = 9420
MATOML_LISTEN_PORT = 9419
MATOCL_LISTEN_PORT = 9421
